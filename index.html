<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Invoice</title>

<style>
:root {
  --bg: #f7f9fc;
  --card: #ffffff;
  --text: #0a2540;
  --muted: #6b7c93;
  --border: #e6ebf1;
  --accent: #635bff;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Inter, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.container {
  max-width: 900px;
  margin: 40px auto;
}

.card {
  background: var(--card);
  border-radius: 14px;
  border: 1px solid var(--border);
  padding: 24px;
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

input, select {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
}

label {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 4px;
  display: block;
}

button {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  cursor: pointer;
}

#invoice { display: none; }

.invoice-box { padding: 40px; font-size: 14px; }

.row {
  display: flex;
  justify-content: space-between;
}

.muted { color: var(--muted); }

.table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

.table th {
  text-align: left;
  font-size: 12px;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
}

.table td {
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}

.total {
  margin-top: 20px;
  text-align: right;
  font-size: 18px;
  font-weight: bold;
}

@media print {
  body * { visibility: hidden; }
  #invoice, #invoice * { visibility: visible; }
  #invoice { position: absolute; left: 0; top: 0; width: 100%; }
}
</style>
</head>

<body>
<div class="container">

<h1>Invoice Generator</h1>

<div class="card grid">
  <div>
    <label>Invoice #</label>
    <input id="invoice_number">
  </div>
  <div>
    <label>Date</label>
    <input id="invoice_date" type="date">
  </div>
  <div>
    <label>Due date</label>
    <input id="due_date" type="date">
  </div>
  <div>
    <label>Currency</label>
    <select id="currency">
      <option value="USD">$ USD</option>
      <option value="EUR">€ EUR</option>
    </select>
  </div>
</div>

<div class="card">
  <h3>From</h3>
  <div class="grid">
    <input id="from_name" placeholder="Company Name">
    <input id="from_email" placeholder="Email">
    <input id="from_phone" placeholder="Phone">
    <input id="from_address" placeholder="Address">
  </div>
</div>

<div class="card">
  <h3>To</h3>
  <div class="grid">
    <input id="to_name" placeholder="Client Name">
    <input id="to_email" placeholder="Email">
    <input id="to_address" placeholder="Address">
  </div>
</div>

<div class="card">
  <h3>Service</h3>
  <div class="grid">
    <input id="item_name" placeholder="Service">
    <input id="item_qty" type="number" placeholder="Qty">
    <input id="item_price" type="number" placeholder="Price">
    <input id="total" placeholder="Total" disabled>
  </div>
</div>

<div class="card">
  <h3>Bank</h3>
  <div class="grid">
    <input id="bank_beneficiary" placeholder="Beneficiary">
    <input id="bank_name" placeholder="Bank">
    <input id="bank_iban" placeholder="IBAN">
    <input id="bank_swift" placeholder="SWIFT">
  </div>
</div>

<button onclick="generate()">Generate PDF</button>

<div id="invoice"></div>

</div>

<script>
const fields = document.querySelectorAll("input, select");

function save() {
  fields.forEach(f => localStorage.setItem(f.id, f.value));
}

function load() {
  fields.forEach(f => {
    const v = localStorage.getItem(f.id);
    if (v) f.value = v;
  });

  if (!invoice_number.value) {
    let n = parseInt(localStorage.getItem("invoice_counter") || "1");
    invoice_number.value = "INV-" + String(n).padStart(3, "0");
  }

  if (!invoice_date.value) {
    let today = new Date();
    invoice_date.value = today.toISOString().slice(0,10);

    let due = new Date();
    due.setDate(today.getDate() + 7);
    due_date.value = due.toISOString().slice(0,10);
  }
}

fields.forEach(f => f.addEventListener("input", save));

function formatMoney(value) {
  const currency = document.getElementById("currency").value;
  return new Intl.NumberFormat("en-US", {
    style: "currency",
    currency
  }).format(value);
}

function calcTotal() {
  let q = parseFloat(item_qty.value) || 0;
  let p = parseFloat(item_price.value) || 0;
  total.value = (q * p).toFixed(2);
}

item_qty.oninput = calcTotal;
item_price.oninput = calcTotal;

function generate() {
  calcTotal();

  let counter = parseInt(localStorage.getItem("invoice_counter") || "1");
  localStorage.setItem("invoice_counter", counter + 1);

  const totalFormatted = formatMoney(parseFloat(total.value) || 0);
  const priceFormatted = formatMoney(parseFloat(item_price.value) || 0);

  const html = `
  <div class="invoice-box">

    <div class="row">
      <div>
        <h2>Invoice</h2>
        <div class="muted">#${invoice_number.value}</div>
      </div>
      <div style="text-align:right">
        <div><strong>Date:</strong> ${invoice_date.value}</div>
        <div><strong>Due:</strong> ${due_date.value}</div>
      </div>
    </div>

    <br><br>

    <div class="row">
      <div>
        <div class="muted">From</div>
        <div><strong>${from_name.value}</strong></div>
        <div>${from_address.value}</div>
        <div>${from_email.value}</div>
        <div>${from_phone.value}</div>
      </div>

      <div>
        <div class="muted">Bill to</div>
        <div><strong>${to_name.value}</strong></div>
        <div>${to_address.value}</div>
        <div>${to_email.value}</div>
      </div>
    </div>

    <table class="table">
      <tr>
        <th>Description</th>
        <th>Qty</th>
        <th>Price</th>
        <th style="text-align:right">Amount</th>
      </tr>
      <tr>
        <td>${item_name.value}</td>
        <td>${item_qty.value}</td>
        <td>${priceFormatted}</td>
        <td style="text-align:right">${totalFormatted}</td>
      </tr>
    </table>

    <div class="total">
      Total: ${totalFormatted}
    </div>

    <br><br>

    <div>
      <div class="muted">Bank details</div>
      <div>${bank_beneficiary.value}</div>
      <div>IBAN: ${bank_iban.value}</div>
      <div>SWIFT: ${bank_swift.value}</div>
      <div>${bank_name.value}</div>
    </div>

  </div>
  `;

  const inv = document.getElementById("invoice");
  inv.innerHTML = html;
  inv.style.display = "block";

  window.print();
}

load();
calcTotal();
</script>

</body>
</html>
